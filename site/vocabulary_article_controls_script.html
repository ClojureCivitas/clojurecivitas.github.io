<script>
(() => {
  const storageKeys = {
    code: 'civitas.vocabulary-articles.code-open',
    equations: 'civitas.vocabulary-articles.equations-open'
  };
  const readPreference = (key, fallback) => {
    try {
      const value = window.localStorage.getItem(key);
      return value === null ? fallback : value === 'true';
    } catch (_error) {
      return fallback;
    }
  };
  const writePreference = (key, value) => {
    try {
      window.localStorage.setItem(key, String(value));
    } catch (_error) {
      // Controls still work for this page when storage is unavailable.
    }
  };
  const ensureToolbar = (articleMain) => {
    const existing = document.getElementById('article-explanations-toggle');
    if (existing) return existing;
    const toolbar = document.createElement('div');
    toolbar.className = 'article-explanations-toolbar';
    toolbar.setAttribute('role', 'region');
    toolbar.setAttribute('aria-labelledby', 'article-explanations-heading');
    toolbar.innerHTML = `
      <p><strong id="article-explanations-heading">Reading controls</strong>
        <span class="article-explanations-description" id="article-explanations-description">Open or close help, code, and equations. Choices for code and equations apply across this article namespace.</span>
        <span class="article-explanations-status" id="article-explanations-status" aria-live="polite">Help is hidden.</span></p>
      <div class="article-reading-action" id="article-help-action">
        <button class="article-explanations-toggle" id="article-explanations-toggle" type="button" aria-pressed="false" aria-describedby="article-explanations-description article-explanations-status">Show all help</button>
      </div>
      <div class="article-reading-action" id="article-code-action">
        <button class="article-code-toggle" id="article-code-toggle" type="button" aria-pressed="false" aria-describedby="article-explanations-description article-code-status">Show all code</button>
        <span class="article-code-status" id="article-code-status" aria-live="polite">Code is hidden.</span>
      </div>
      <div class="article-reading-action" id="article-equations-action">
        <button class="article-equations-toggle" id="article-equations-toggle" type="button" aria-pressed="true" aria-describedby="article-explanations-description article-equations-status">Hide all equations</button>
        <span class="article-equations-status" id="article-equations-status" aria-live="polite">Equations are shown.</span>
      </div>`;
    const seriesNavigation = articleMain.querySelector(':scope > .series-toc');
    if (seriesNavigation) seriesNavigation.insertAdjacentElement('afterend', toolbar);
    else articleMain.insertAdjacentElement('afterbegin', toolbar);
    return toolbar.querySelector('#article-explanations-toggle');
  };

  const initialise = () => {
    const articleMain = document.getElementById('quarto-document-content') || document.querySelector('main');
    if (!articleMain) return;
    document.body.classList.add('vocabulary-article-managed');
    const mathRegistries = Array.from(document.querySelectorAll('.math-explanation-registry'));
    const termRegistries = Array.from(document.querySelectorAll('.term-explanation-registry'));
    const codeSymbolRegistries = Array.from(document.querySelectorAll('.code-symbol-explanation-registry'));
    const codeDetails = Array.from(document.querySelectorAll('details.article-code-detail'));
    const hasManageableContent = mathRegistries.length > 0
      || termRegistries.length > 0
      || codeSymbolRegistries.length > 0
      || codeDetails.length > 0
      || Boolean(document.querySelector('details.article-explanation, span.math.display, mjx-container[display=true]'));
    if (!hasManageableContent) {
      document.querySelector('.article-explanations-toolbar')?.remove();
      document.querySelector('.article-explanation-rail')?.remove();
      document.body.classList.remove('article-explanations-open');
      articleMain.classList.remove('article-explanations-open');
      return;
    }
    const globalButton = ensureToolbar(articleMain);
    if (globalButton.dataset.initialized === 'true') return;

    const marginQuery = window.matchMedia('(min-width: 1280px)');
    const toolbar = globalButton.closest('.article-explanations-toolbar');
    const helpAction = document.getElementById('article-help-action') || globalButton.closest('.article-reading-action');
    const codeAction = document.getElementById('article-code-action');
    const codeButton = document.getElementById('article-code-toggle');
    const codeStatus = document.getElementById('article-code-status');
    const equationsAction = document.getElementById('article-equations-action');
    const equationsButton = document.getElementById('article-equations-toggle');
    const equationsStatus = document.getElementById('article-equations-status');

    const makeHelpButton = ({label, controls, classes = []}) => {
      const help = document.createElement('button');
      help.type = 'button';
      help.className = ['article-help-icon', ...classes].join(' ');
      help.textContent = '?';
      help.setAttribute('aria-label', label);
      help.setAttribute('title', label);
      help.setAttribute('aria-controls', controls.join(' '));
      help.setAttribute('aria-expanded', 'false');
      return help;
    };

    const titleIconClasses = {
      equation: 'article-equation-title-icon',
      code: 'article-code-title-icon',
      'math-help': 'article-math-help-title-icon',
      'code-help': 'article-code-help-title-icon',
      'text-help': 'article-text-help-title-icon'
    };
    const decorateTitle = (summary, kind, glyph) => {
      if (!summary || summary.querySelector(':scope > .article-box-title-icon')) return;
      const icon = document.createElement('span');
      icon.className = `article-box-title-icon ${titleIconClasses[kind]}`;
      icon.textContent = glyph;
      icon.setAttribute('aria-hidden', 'true');
      summary.insertBefore(icon, summary.firstChild);
    };

    const ensureLayout = (anchor) => {
      const existing = anchor.closest('.article-explanation-layout');
      if (existing && existing.querySelector(':scope > .article-explanation-anchor') === anchor) {
        return existing;
      }
      const layout = document.createElement('div');
      layout.className = 'article-explanation-layout';
      const slot = document.createElement('div');
      slot.className = 'article-explanation-slot';
      anchor.classList.add('article-explanation-anchor');
      anchor.parentElement.insertBefore(layout, anchor);
      layout.appendChild(anchor);
      layout.appendChild(slot);
      return layout;
    };

    const layoutSlot = (layout) => layout.querySelector(':scope > .article-explanation-slot');
    const containsDisplayEquation = (node) => Boolean(
      node && node.querySelector('span.math.display, mjx-container[display=true]')
    );
    const precedingEquation = (registry) => {
      let cursor = registry;
      for (let depth = 0; cursor && cursor.parentElement && depth < 4; depth += 1) {
        let candidate = cursor.previousElementSibling;
        while (candidate) {
          if (containsDisplayEquation(candidate)) return candidate;
          candidate = candidate.previousElementSibling;
        }
        if (cursor.parentElement.matches('section')) break;
        cursor = cursor.parentElement;
      }
      return null;
    };

    mathRegistries.forEach((registry, registryIndex) => {
      const items = Array.from(registry.querySelectorAll(':scope > details.article-explanation'));
      const anchor = precedingEquation(registry);
      if (!anchor || items.length === 0) return;
      const accentClass = `accent-${(registryIndex % 6) + 1}`;
      const layout = ensureLayout(anchor);
      layout.classList.add('equation-explanation-layout');
      const slot = layoutSlot(layout);
      items.forEach((item) => {
        item.classList.add(accentClass);
        slot.appendChild(item);
      });
      anchor.classList.add('equation-help-anchor');
      const title = registry.dataset.explanationTitle || 'this equation';
      anchor.dataset.equationTitle = title;
      const help = makeHelpButton({
        label: `Explain ${title}`,
        controls: items.map((item) => item.id),
        classes: ['equation-help-icon', accentClass]
      });
      anchor.appendChild(help);
      registry.remove();
    });

    const excludedTextNode = (node) => Boolean(node.parentElement && node.parentElement.closest(
      'script,style,pre,code,svg,details,.article-explanations-toolbar,.article-explanation-registry,.article-help-icon'
    ));
    const normaliseTerm = (text) => text.toLocaleLowerCase().replace(/[‐‑‒–—]/g, '-');
    const isBoundary = (character) => !character || !/[A-Za-z0-9‐‑‒–—-]/.test(character);
    const firstTermMatch = (root, text) => {
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      const needle = normaliseTerm(text);
      let node;
      while ((node = walker.nextNode())) {
        if (excludedTextNode(node)) continue;
        const haystack = normaliseTerm(node.nodeValue || '');
        let index = haystack.indexOf(needle);
        while (index >= 0) {
          const afterIndex = index + needle.length;
          const plural = haystack[afterIndex] === 's' && isBoundary(haystack[afterIndex + 1]);
          if (isBoundary(haystack[index - 1]) && (isBoundary(haystack[afterIndex]) || plural)) {
            return {node, index, length: needle.length + (plural ? 1 : 0)};
          }
          index = haystack.indexOf(needle, index + 1);
        }
      }
      return null;
    };
    const anchorBlockFor = (node) => node.parentElement?.closest('p,blockquote,li,figcaption,h2,h3,h4') || node.parentElement;
    const appendInlineHelp = (match, help) => {
      const after = match.node.splitText(match.index + match.length);
      after.parentNode.insertBefore(help, after);
    };

    termRegistries.forEach((registry) => {
      const items = Array.from(registry.querySelectorAll(':scope > details.article-explanation'));
      const searchRoot = registry.closest('section') || articleMain;
      items.forEach((item) => {
        const anchorText = item.dataset.anchorTerm || item.dataset.helpLabel || '';
        const match = firstTermMatch(searchRoot, anchorText);
        const fallbackAnchor = registry.previousElementSibling;
        const anchor = match ? anchorBlockFor(match.node) : fallbackAnchor;
        if (!anchor) return;
        const layout = ensureLayout(anchor);
        layoutSlot(layout).appendChild(item);
        const helpLabel = item.dataset.helpLabel || anchorText;
        const category = item.classList.contains('lexical') ? 'lexical' : 'design';
        const help = makeHelpButton({
          label: `Explain ${helpLabel}`,
          controls: [item.id],
          classes: ['term-help-icon', category]
        });
        if (match) appendInlineHelp(match, help);
        else anchor.appendChild(help);
      });
      registry.remove();
    });

    const firstCodeSymbolMatch = (root, text) => {
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      const needle = text.toLocaleLowerCase();
      let node;
      while ((node = walker.nextNode())) {
        const haystack = (node.nodeValue || '').toLocaleLowerCase();
        let index = haystack.indexOf(needle);
        while (index >= 0) {
          const afterIndex = index + needle.length;
          if (isBoundary(haystack[index - 1]) && isBoundary(haystack[afterIndex])) {
            return {node, index, length: needle.length};
          }
          index = haystack.indexOf(needle, index + 1);
        }
      }
      return null;
    };

    codeSymbolRegistries.forEach((registry) => {
      const detail = registry.closest('details.article-equation-code');
      const code = detail?.querySelector('pre code');
      if (!detail || !code) return;
      const slot = document.createElement('div');
      slot.className = 'article-explanation-slot article-code-explanation-slot';
      code.closest('pre').insertAdjacentElement('afterend', slot);
      const items = Array.from(registry.querySelectorAll(':scope > details.article-explanation'));
      items.forEach((item) => {
        const symbol = item.dataset.anchorTerm || item.dataset.helpLabel || '';
        const match = firstCodeSymbolMatch(code, symbol);
        slot.appendChild(item);
        const help = makeHelpButton({
          label: `Explain code symbol ${symbol}`,
          controls: [item.id],
          classes: ['code-help-icon']
        });
        if (match) appendInlineHelp(match, help);
        else code.appendChild(help);
      });
      registry.remove();
    });

    const equationCodeDetails = codeDetails.filter((detail) => detail.classList.contains('article-equation-code'));
    equationCodeDetails.forEach((detail) => {
      const anchor = precedingEquation(detail);
      if (!anchor) return;
      const title = (detail.querySelector(':scope > summary')?.textContent || '')
        .replace(/^Code detail:\s*/, '')
        .trim();
      if (title && !anchor.dataset.equationTitle) anchor.dataset.equationTitle = title;
    });
    codeDetails.forEach((detail) => {
      decorateTitle(detail.querySelector(':scope > summary'), 'code', '</>');
    });

    const displayMath = Array.from(document.querySelectorAll('span.math.display, mjx-container[display=true]'));
    const equationTargets = Array.from(new Set(displayMath.map((node) =>
      node.closest('.equation-explanation-layout') || node.closest('p') || node.parentElement
    ).filter(Boolean)));
    const equationDetails = equationTargets.map((target, index) => {
      const detail = document.createElement('details');
      detail.className = 'article-equation-detail';
      detail.open = true;
      const summary = document.createElement('summary');
      const title = target.dataset.equationTitle
        || target.querySelector('[data-equation-title]')?.dataset.equationTitle
        || `Equation ${index + 1}`;
      summary.textContent = `Equation: ${title}`;
      decorateTitle(summary, 'equation', '∑');
      const body = document.createElement('div');
      body.className = 'article-equation-detail-body';
      target.parentElement.insertBefore(detail, target);
      detail.appendChild(summary);
      detail.appendChild(body);
      body.appendChild(target);
      return detail;
    });

    if (equationDetails.length !== equationCodeDetails.length) {
      console.error(`Managed article contract: found ${equationDetails.length} display equations but ${equationCodeDetails.length} equation code disclosures.`);
    }

    let codePreference = readPreference(storageKeys.code, false);
    let equationsPreference = readPreference(storageKeys.equations, true);
    codeDetails.forEach((item) => { item.open = codePreference; });
    equationDetails.forEach((item) => { item.open = equationsPreference; });

    const explanations = Array.from(document.querySelectorAll('details.article-explanation'));
    explanations.forEach((item) => {
      const summary = item.querySelector(':scope > summary');
      if (item.classList.contains('code-symbol-explanation')) {
        decorateTitle(summary, 'code-help', '</>');
      } else if (item.classList.contains('math-explanation')) {
        decorateTitle(summary, 'math-help', '∑');
      } else {
        decorateTitle(summary, 'text-help', '?');
      }
    });
    const mathExplanations = explanations.filter((item) => item.classList.contains('math-explanation'));
    const terminologyExplanations = explanations.filter((item) => item.classList.contains('term-explanation'));
    const codeSymbolExplanations = explanations.filter((item) => item.classList.contains('code-symbol-explanation'));
    const helpButtons = Array.from(document.querySelectorAll('.article-help-icon'));
    const heading = document.getElementById('article-explanations-heading');
    const description = document.getElementById('article-explanations-description');
    const status = document.getElementById('article-explanations-status');
    const itemOrigins = new Map();
    const itemAnchors = new Map();
    explanations.forEach((item) => {
      const slot = item.closest('.article-explanation-slot');
      const layout = slot?.closest('.article-explanation-layout');
      itemOrigins.set(item, slot);
      itemAnchors.set(item,
        layout?.querySelector(':scope > .article-explanation-anchor')
        || slot?.closest('.article-code-detail')?.querySelector('pre')
        || null);
    });
    const rail = document.createElement('aside');
    rail.className = 'article-explanation-rail';
    rail.setAttribute('aria-label', 'Expanded explanations');
    const railGuide = document.createElement('section');
    railGuide.className = 'article-explanation-rail-guide';
    const railGuideHeading = document.createElement('strong');
    railGuideHeading.textContent = 'Using explanation cards';
    const railGuideText = document.createElement('p');
    railGuideText.textContent = 'Cards relevant to the text in view scroll into place automatically. You can also scroll these cards independently. Select an open card to hide it.';
    const railHideAll = document.createElement('button');
    railHideAll.type = 'button';
    railHideAll.className = 'article-explanation-hide-all';
    railHideAll.textContent = 'Hide all explanations';
    railGuide.appendChild(railGuideHeading);
    railGuide.appendChild(railGuideText);
    railGuide.appendChild(railHideAll);
    const railStack = document.createElement('div');
    railStack.className = 'article-explanation-rail-stack';
    rail.appendChild(railGuide);
    rail.appendChild(railStack);
    document.body.appendChild(rail);

    const controlledItems = (help) => (help.getAttribute('aria-controls') || '')
      .split(/\s+/)
      .filter(Boolean)
      .map((id) => document.getElementById(id))
      .filter(Boolean);
    const setOpen = (item, open) => {
      item.open = open;
    };
    const layouts = () => Array.from(document.querySelectorAll('.article-explanation-layout'));
    const arrangeForViewport = () => {
      if (marginQuery.matches) {
        explanations.forEach((item) => railStack.appendChild(item));
      } else {
        explanations.forEach((item) => itemOrigins.get(item)?.appendChild(item));
      }
    };
    const relevantOpenItem = () => {
      const viewportCentre = window.innerHeight / 2;
      let relevant = null;
      let nearestDistance = Number.POSITIVE_INFINITY;
      const consideredAnchors = new Set();
      explanations.forEach((item) => {
        if (!item.open) return;
        const anchor = itemAnchors.get(item);
        if (!anchor || consideredAnchors.has(anchor)) return;
        consideredAnchors.add(anchor);
        const rect = anchor.getBoundingClientRect();
        const distance = Math.abs((rect.top + rect.bottom) / 2 - viewportCentre);
        if (distance < nearestDistance) {
          relevant = item;
          nearestDistance = distance;
        }
      });
      return relevant;
    };
    const centreRelevantExplanation = () => {
      explanations.forEach((item) => item.classList.remove('is-relevant'));
      if (!marginQuery.matches) return;
      const relevant = relevantOpenItem();
      if (!relevant) return;
      relevant.classList.add('is-relevant');
      const railRect = rail.getBoundingClientRect();
      const viewportCentreWithinRail = window.innerHeight / 2 - railRect.top;
      const targetScroll = relevant.offsetTop + relevant.offsetHeight / 2 - viewportCentreWithinRail;
      rail.scrollTop = Math.max(0, targetScroll);
    };
    let placementFrame = null;
    const schedulePlacement = () => {
      if (placementFrame !== null) return;
      placementFrame = window.requestAnimationFrame(() => {
        placementFrame = null;
        centreRelevantExplanation();
      });
    };
    const sync = () => {
      const openItems = explanations.filter((item) => item.open);
      const allOpen = explanations.length > 0 && openItems.length === explanations.length;
      const openMath = mathExplanations.filter((item) => item.open).length;
      const openTerms = terminologyExplanations.filter((item) => item.open).length;
      const openCodeSymbols = codeSymbolExplanations.filter((item) => item.open).length;
      const hasAvailableControls = explanations.length > 0
        || codeDetails.length > 0
        || equationDetails.length > 0;

      if (toolbar) toolbar.hidden = !hasAvailableControls;
      helpButtons.forEach((help) => {
        const targets = controlledItems(help);
        help.setAttribute('aria-expanded', String(targets.length > 0 && targets.every((item) => item.open)));
      });
      layouts().forEach((layout) => {
        const slot = layoutSlot(layout);
        const hasOpen = explanations.some((item) => item.open && itemOrigins.get(item) === slot);
        if (slot) slot.classList.toggle('has-open', hasOpen);
      });
      rail.classList.toggle('has-open', openItems.length > 0);
      document.body.classList.toggle('article-explanations-open', openItems.length > 0);
      if (articleMain) articleMain.classList.toggle('article-explanations-open', openItems.length > 0);
      globalButton.setAttribute('aria-pressed', String(allOpen));
      globalButton.textContent = `${allOpen ? 'Hide' : 'Show'} all help`;
      if (heading) heading.textContent = 'Reading controls';
      const bothKinds = mathExplanations.length > 0 && terminologyExplanations.length > 0;
      const countParts = [];
      const progressParts = [];
      if (mathExplanations.length > 0) {
        countParts.push(`${mathExplanations.length} mathematical item${mathExplanations.length === 1 ? '' : 's'}`);
        progressParts.push(`${openMath} of ${mathExplanations.length} mathematical item${mathExplanations.length === 1 ? '' : 's'}`);
      }
      if (terminologyExplanations.length > 0) {
        countParts.push(`${terminologyExplanations.length} terminology item${terminologyExplanations.length === 1 ? '' : 's'}`);
        progressParts.push(`${openTerms} of ${terminologyExplanations.length} terminology item${terminologyExplanations.length === 1 ? '' : 's'}`);
      }
      if (codeSymbolExplanations.length > 0) {
        countParts.push(`${codeSymbolExplanations.length} code symbol${codeSymbolExplanations.length === 1 ? '' : 's'}`);
        progressParts.push(`${openCodeSymbols} of ${codeSymbolExplanations.length} code symbol${codeSymbolExplanations.length === 1 ? '' : 's'}`);
      }
      if (helpAction) helpAction.hidden = explanations.length === 0;
      if (description) {
        const descriptionParts = [];
        if (explanations.length > 0) descriptionParts.push('Use ? for symbol and term help.');
        if (codeDetails.length > 0 && equationDetails.length > 0) {
          descriptionParts.push('Code and equation choices persist across every page in this authored namespace.');
        } else if (codeDetails.length > 0) {
          descriptionParts.push('The code choice persists across every page in this authored namespace.');
        } else if (equationDetails.length > 0) {
          descriptionParts.push('The equation choice persists across every page in this authored namespace.');
        }
        description.textContent = descriptionParts.join(' ');
      }
      if (status) {
        status.hidden = explanations.length === 0;
        status.textContent = explanations.length === 0
          ? 'No optional help on this page.'
          : openItems.length === 0
          ? `${countParts.join(' and ')} ${explanations.length === 1 ? 'is' : 'are'} hidden.`
          : `${progressParts.join(' and ')} shown.`;
      }

      const openCodeCount = codeDetails.filter((item) => item.open).length;
      const allCodeOpen = codeDetails.length > 0
        ? openCodeCount === codeDetails.length
        : codePreference;
      if (codeAction) codeAction.hidden = codeDetails.length === 0;
      if (codeButton) {
        codeButton.setAttribute('aria-pressed', String(allCodeOpen));
        codeButton.textContent = allCodeOpen ? 'Hide all code' : 'Show all code';
      }
      if (codeStatus) {
        codeStatus.textContent = codeDetails.length > 0
          ? `${openCodeCount}/${codeDetails.length} code sections open.`
          : `No code here; global preference is ${codePreference ? 'show' : 'hide'}.`;
      }

      const openEquationCount = equationDetails.filter((item) => item.open).length;
      const allEquationsOpen = equationDetails.length > 0
        ? openEquationCount === equationDetails.length
        : equationsPreference;
      if (equationsAction) equationsAction.hidden = equationDetails.length === 0;
      if (equationsButton) {
        equationsButton.setAttribute('aria-pressed', String(allEquationsOpen));
        equationsButton.textContent = allEquationsOpen ? 'Hide all equations' : 'Show all equations';
      }
      if (equationsStatus) {
        equationsStatus.textContent = equationDetails.length > 0
          ? `${openEquationCount}/${equationDetails.length} equation sections open.`
          : `No equations here; global preference is ${equationsPreference ? 'show' : 'hide'}.`;
      }
    };

    globalButton.addEventListener('click', () => {
      const shouldOpen = !explanations.every((item) => item.open);
      explanations.forEach((item) => setOpen(item, shouldOpen));
      sync();
      schedulePlacement();
    });
    if (codeButton) {
      codeButton.addEventListener('click', () => {
        const shouldOpen = codeDetails.length > 0
          ? !codeDetails.every((item) => item.open)
          : !codePreference;
        codePreference = shouldOpen;
        codeDetails.forEach((item) => setOpen(item, shouldOpen));
        writePreference(storageKeys.code, shouldOpen);
        sync();
      });
    }
    if (equationsButton) {
      equationsButton.addEventListener('click', () => {
        const shouldOpen = equationDetails.length > 0
          ? !equationDetails.every((item) => item.open)
          : !equationsPreference;
        equationsPreference = shouldOpen;
        equationDetails.forEach((item) => setOpen(item, shouldOpen));
        writePreference(storageKeys.equations, shouldOpen);
        sync();
      });
    }
    railHideAll.addEventListener('click', () => {
      explanations.forEach((item) => setOpen(item, false));
      sync();
      schedulePlacement();
    });
    helpButtons.forEach((help) => {
      help.addEventListener('click', () => {
        const targets = controlledItems(help);
        const shouldOpen = targets.some((item) => !item.open);
        targets.forEach((item) => setOpen(item, shouldOpen));
        sync();
        schedulePlacement();
      });
    });
    explanations.forEach((item) => {
      item.addEventListener('click', (event) => {
        const interactive = event.target instanceof Element && event.target.closest('a,button,input,select,textarea');
        if (!item.open || interactive) return;
        event.preventDefault();
        setOpen(item, false);
        sync();
        schedulePlacement();
      });
      item.addEventListener('toggle', () => {
        sync();
        schedulePlacement();
      });
    });
    codeDetails.forEach((item) => item.addEventListener('toggle', sync));
    equationDetails.forEach((item) => item.addEventListener('toggle', sync));
    marginQuery.addEventListener('change', () => {
      arrangeForViewport();
      sync();
      schedulePlacement();
    });
    window.addEventListener('scroll', schedulePlacement, {passive: true});
    window.addEventListener('resize', schedulePlacement);
    window.addEventListener('storage', (event) => {
      if (event.key === storageKeys.code) {
        const open = event.newValue === 'true';
        codePreference = open;
        codeDetails.forEach((item) => setOpen(item, open));
        sync();
      }
      if (event.key === storageKeys.equations) {
        const open = event.newValue !== 'false';
        equationsPreference = open;
        equationDetails.forEach((item) => setOpen(item, open));
        sync();
      }
    });
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(schedulePlacement);
    window.setTimeout(schedulePlacement, 250);
    window.setTimeout(schedulePlacement, 1000);
    globalButton.dataset.initialized = 'true';
    arrangeForViewport();
    sync();
    schedulePlacement();
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initialise, {once: true});
  } else {
    initialise();
  }
})();
</script>
